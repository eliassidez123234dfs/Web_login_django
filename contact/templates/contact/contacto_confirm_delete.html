{% extends 'base.html' %}

{% block title %}Eliminar contacto — RED{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="form-red-card text-center">
                <div class="form-header">
                    <h4>Eliminar contacto</h4>
                </div>
                <div class="card-body">
                    <p class="mb-4">¿Estás seguro de eliminar <strong>{{ contact.nombre }}</strong>?</p>
                    <p class="text-muted small mb-4">Esta acción no se puede deshacer.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-red">Eliminar</button>
                            <a href="{% url 'contact:admin_panel' %}" class="btn btn-outline-red">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
