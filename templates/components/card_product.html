{% load static %}
<div class="product-card h-100 position-relative">
    <a href="{% url 'products:detail' producto.id %}" class="text-decoration-none">
        <div class="product-card-img">
            {% if producto.imagen %}
                <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" class="product-card-img" style="object-fit: cover;">
            {% else %}
                <span>{{ producto.nombre }}</span>
            {% endif %}
        </div>
    </a>
    <div class="product-card-body">
        <h3 class="product-card-title">{{ producto.nombre }}</h3>
        <p class="product-card-price">${{ producto.precio|floatformat:0 }}</p>
        <a href="{% url 'products:detail' producto.id %}" class="btn btn-outline-red btn-sm w-100">Ver detalle</a>
    </div>
</div>
